completions:
  - name: nb edit
    patterns:
      - "^nb e( .*)? $"
      - "^nb edit( .*)? $"
    sourceCommand: "nb ls --no-color | grep -E '^\\[[0-9]+\\]'"
    options:
      --ansi: true # ← ANSIカラー有効
      --prompt: "'nb edit >'"
      --preview: "echo {} | sed -E 's/^\\[([0-9]+)\\].*/\\1/' | xargs nb show"
    callback: "sed -E 's/^\\[([0-9]+)\\].*/\\1/'"
  - name: nb subcommands
    patterns:
      - ^\s*nb\s*$
      - ^\s*nb\s+help\s*$
    sourceCommand: nb subcommands
    options:
      --prompt: "'nb subcommand >'"

snippets:
  - name: git status
    keyword: gs
    snippet: git status

  - name: git commit message
    keyword: gcm
    snippet: git commit -m '{{commit_message}}'

  - name: git push
    keyword: gp
    snippet: git push origin

  - name: cd config
    keyword: cf
    snippet: cd ~/.config/

  - name: open zshrc
    keyword: ozr
    snippet: nvim ~/.zshrc

  - name: Edit Note
    keyword: nbe
    snippet: "nb edit "

  - name: List Note
    keyword: nbl
    snippet: nb ls --limit 20

  - name: List All Note
    keyword: nbla
    snippet: nb ls --all

  - name: nb search
    keyword: nbg
    snippet: rg "{{keyword}}" "$(nb notebooks current --path)"

  - name: plamo-translate server
    keyword: pts
    snippet: plamo-translate server

  - name: plamo-translate japanese
    keyword: ptj
    snippet: plamo-translate --to Japanese
    context:
      global: true

  - name: boundary connect enpit test-ssh
    keyword: bcet
    snippet: boundary connect -target-id ttcp_Zd8CYvOxL3

  - name: boundary target list
    keyword: btl
    snippet: boundary targets list -scope-id global -recursive

  - name: enpit ssh connect
    keyword: sshe
    snippet: ssh -p 10022 enpit@localhost

  - name: cd dotfiles
    keyword: dot
    snippet: cd ~/.dotfiles

  - name: cd lectures
    keyword: lec
    snippet: cd ~/lectures
